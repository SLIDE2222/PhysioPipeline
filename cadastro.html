<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar perfil | Physio Pipeline</title>
  <link rel="stylesheet" href="style.css?v=cadastro-autocomplete-match1" />
 <meta name="google-client-id" content="197182747757-6tm1e8vhu44fkpf89pvvsbooodl48t3o.apps.googleusercontent.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">Physio<span>Pipeline</span></a>
      <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="buscar.html">Buscar</a>
      </nav>
      <a href="buscar.html" class="btn btn-outline">Buscar</a>
    </div>
  </header>

  <main class="page-main">
    <section class="page-section">
      <div class="container narrow">
        <div class="section-heading left">
          <p class="eyebrow">Cadastro profissional</p>
          <h1>Crie sua conta e seu perfil</h1>
          <p>Preencha os dados abaixo para criar sua conta e publicar seu perfil profissional de uma vez.</p>
        </div>

        <form class="form-card" id="cadastroForm">
        <div class="google-auth-card">
          <p class="form-hint">Ou continue com Google</p>
          <button type="button" class="google-full-btn" id="googleSignupButton">
            <span class="google-full-btn__icon" aria-hidden="true">G</span>
            <span>Continuar com o Google</span>
          </button>
          <div data-google-auth data-width="400" class="google-hidden-render"></div>
        </div>

        <div class="form-divider">
          <span>ou preencha manualmente</span>
        </div>
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seuemail@email.com" required />

          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required />

          <label for="confirmarSenha">Confirmar senha</label>
          <input
            type="password"
            id="confirmarSenha"
            name="confirmarSenha"
            placeholder="Repita a senha"
            required
          />
          <p id="senhaErro" style="color:#b91c1c; font-size:0.9rem; margin-bottom: 12px;"></p>

          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" name="telefone" placeholder="(11) 99999-9999" required />

          <label for="foto">Foto do perfil</label>
          <input type="file" id="foto" name="foto" accept="image/*" />

          <div class="image-preview-wrapper">
            <img id="fotoPreview" class="image-preview" alt="Prévia da foto" />
          </div>

          <label for="especialidadeCadastro">Especialidade</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="especialidadeCadastro"
              name="especialidade"
              placeholder="Digite uma especialidade"
              autocomplete="off"
              required
            />
            <ul id="especialidadeCadastroSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="cidadeCadastro">Cidade</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="cidadeCadastro"
              name="cidade"
              placeholder="Digite uma cidade"
              autocomplete="off"
              required
            />
            <ul id="cidadeCadastroSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="bairro">Bairro</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="bairro"
              name="bairro"
              placeholder="Selecione ou digite uma cidade primeiro"
              autocomplete="off"
              disabled
              required
            />
            <ul id="bairroCadastroSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="atendimento">Tipo de atendimento</label>
          <select id="atendimento" name="atendimento" required>
            <option value="" disabled selected>Selecione uma opção</option>
            <option value="Clínica">Clínica</option>
            <option value="Domiciliar">Domiciliar</option>
            <option value="Clínica e domiciliar">Clínica e domiciliar</option>
            <option value="Online">Online</option>
          </select>

          <label for="instagram">Instagram</label>
          <input
            type="url"
            id="instagram"
            name="instagram"
            placeholder="https://instagram.com/seuperfil"
          />

          <label for="linkedin">LinkedIn</label>
          <input
            type="url"
            id="linkedin"
            name="linkedin"
            placeholder="https://linkedin.com/in/seuperfil"
          />

          <label for="descricao">Descrição profissional</label>
          <textarea
            id="descricao"
            name="descricao"
            rows="5"
            placeholder="Fale brevemente sobre sua atuação..."
            required
          ></textarea>

          <button type="submit" class="btn btn-primary btn-block">
            Criar conta e meu perfil
          </button>

          <p id="cadastroMensagem" class="success-message"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="api.js?v=iphone-login-fix7"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="google-auth.js?v=iphone-login-fix7"></script>
  <script src="script.js?v=iphone-login-fix7"></script>

  <script>
    const CADASTRO_SPECIALTY_OPTIONS = [
      'Fisioterapia Ortopédica',
      'Fisioterapia Esportiva',
      'Fisioterapia Neurológica',
      'Fisioterapia Geriátrica',
      'Fisioterapia Respiratória',
      'Fisioterapia Pediátrica',
      'Fisioterapia do Trabalho',
      'Fisioterapia Ocupacional',
      'Fisioterapia Dermatofuncional',
      'Fisioterapia Pélvica',
      'Fisioterapia Cardiovascular',
      'Fisioterapia Aquática',
      'Fisioterapia Home Care',
      'Fisioterapia Domiciliar',
      'Quiropraxia',
      'Pilates',
      'Domiciliar',
      'Ocupacional',
      'Ergonomia',
      'Pós-operatório'
    ];

    function setupCadastroAutocomplete(inputId, suggestionsId, options) {
      const input = document.getElementById(inputId);
      const suggestions = document.getElementById(suggestionsId);

      if (!input || !suggestions) return;

      function renderSuggestions() {
        const term = input.value.trim().toLowerCase();

        const filteredOptions = options.filter((option) =>
          option.toLowerCase().includes(term)
        );

        suggestions.innerHTML = '';

        filteredOptions.forEach((option) => {
          const item = document.createElement('li');
          item.textContent = option;

          item.addEventListener('mousedown', (event) => {
            event.preventDefault();
            input.value = option;
            suggestions.innerHTML = '';
            suggestions.style.display = 'none';

            input.dispatchEvent(new Event('input', { bubbles: true }));
            input.dispatchEvent(new Event('change', { bubbles: true }));
          });

          suggestions.appendChild(item);
        });

        suggestions.style.display = filteredOptions.length ? 'block' : 'none';
      }

      input.addEventListener('input', renderSuggestions);
      input.addEventListener('focus', renderSuggestions);

      input.addEventListener('blur', () => {
        setTimeout(() => {
          suggestions.innerHTML = '';
          suggestions.style.display = 'none';
        }, 120);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupCadastroAutocomplete(
        'especialidadeCadastro',
        'especialidadeCadastroSuggestions',
        CADASTRO_SPECIALTY_OPTIONS
      );

      if (typeof setupCityNeighborhoodAutocomplete === 'function') {
        setupCityNeighborhoodAutocomplete(
          'cidadeCadastro',
          'cidadeCadastroSuggestions',
          'bairro',
          'bairroCadastroSuggestions'
        );
      }
    });
  </script>

</body>
</html>
