<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrando com Google | PhysioPipeline</title>
  <meta name="description" content="Finalizando seu login com Google no PhysioPipeline." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />
  <link rel="stylesheet" href="style.css?v=google-click-fix4" />
</head>
<body class="product-form-page login-page">
  <main class="page-main">
    <section class="page-section">
      <div class="container auth-page-layout">
        <div class="form-card">
          <p class="eyebrow">Google</p>
          <h1>Finalizando login</h1>
          <p id="authCallbackMessage">Aguarde enquanto confirmamos sua sess&atilde;o.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="account-types.js?v=accounttype1"></script>
  <script src="api.js?v=rankedfallback2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js?v=supabase-client2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const message = document.getElementById('authCallbackMessage');

      try {
        const searchParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        const paramsObject = Object.fromEntries(searchParams.entries());
        const hashObject = Object.fromEntries(hashParams.entries());
        const hasCode = searchParams.has('code');
        const oauthError = searchParams.get('error') || hashParams.get('error');
        const oauthErrorCode = searchParams.get('error_code') || hashParams.get('error_code');
        const oauthErrorDescription =
          searchParams.get('error_description') ||
          hashParams.get('error_description');

        console.log('Supabase library:', window.supabase);
        console.log('Supabase client:', window.supabaseClient);
        console.log('Google OAuth client auth:', window.supabaseClient?.auth);
        console.log('OAuth callback URL:', window.location.href);
        console.log('OAuth callback search params:', paramsObject);
        console.log('OAuth callback hash params:', hashObject);

        if (!window.supabaseClient?.auth) {
          throw new Error('Supabase client auth is not available on the callback page.');
        }

        if (oauthError) {
          console.error('Supabase OAuth returned an error before session exchange:', {
            error: oauthError,
            error_code: oauthErrorCode,
            error_description: oauthErrorDescription,
            href: window.location.href,
            searchParams: paramsObject,
            hashParams: hashObject,
          });

          const sessionResult = await window.supabaseClient.auth.getSession();
          console.log('Supabase OAuth getSession result:', sessionResult);

          message.textContent =
            oauthErrorDescription ||
            'O Google retornou um erro de configura&ccedil;&atilde;o OAuth. Verifique Client ID, Client Secret e Redirect URI no Supabase/Google Cloud.';
          return;
        }

        let exchangeResult = null;

        if (hasCode) {
          exchangeResult = await window.supabaseClient.auth.exchangeCodeForSession(window.location.href);
          console.log('Supabase OAuth exchangeCodeForSession result:', exchangeResult);

          if (exchangeResult.error) {
            throw exchangeResult.error;
          }
        } else {
          console.log('Supabase OAuth exchangeCodeForSession result:', {
            skipped: true,
            reason: 'No code search param found in callback URL.',
          });
        }

        const sessionResult = await window.supabaseClient.auth.getSession();
        console.log('Supabase OAuth getSession result:', sessionResult);

        if (sessionResult.error) throw sessionResult.error;

        const session =
          sessionResult.data?.session ||
          exchangeResult?.data?.session ||
          null;

        if (!session?.access_token) {
          console.error('Supabase OAuth session not found after callback processing:', {
            href: window.location.href,
            searchParams: paramsObject,
            hashParams: hashObject,
            exchangeResult,
            sessionResult,
          });
          message.textContent = 'Sess&atilde;o do Google n&atilde;o encontrada. Tente entrar novamente.';
          return;
        }

        const accountType = sessionStorage.getItem('pendingGoogleAccountType') || 'physio';
        const authData = await window.physioApi.loginWithSupabase(
          session.access_token,
          accountType
        );

        sessionStorage.removeItem('pendingGoogleAccountType');
        console.log('PhysioPipeline Supabase OAuth exchange:', authData);

        message.textContent = 'Login com Google confirmado. Redirecionando...';
        const targetPath = window.physioApi?.resolveUserHomePath?.(authData?.user) || 'profile.html';
        window.location.replace(targetPath);
      } catch (error) {
        console.error('OAuth callback error:', error);
        message.textContent = error.message || 'N&atilde;o foi poss&iacute;vel concluir o login com Google.';
      }
    });
  </script>
</body>
</html>
