<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">Physio<span>Pipeline</span></a>
      <nav class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="buscar.html">Buscar</a>
      </nav>
      <div id="authArea" style="display:flex; gap:10px;"></div>
    </div>
  </header>

  <main class="page-main">
    <section class="page-section">
      <div class="container narrow">
        <div class="section-heading left">
          <p class="eyebrow">Editar perfil</p>
          <h1>Atualize seu perfil</h1>
          <p>Altere foto, contato e descri&ccedil;&atilde;o sem ter que recriar tudo.</p>
        </div>

        <form class="form-card" id="editarPerfilForm">
          <label for="foto">Foto do perfil</label>
          <input type="file" id="foto" name="foto" accept="image/*" />

          <div class="image-preview-wrapper">
            <img id="fotoPreview" class="image-preview" alt="Pr&eacute;via da foto" />
          </div>

          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" name="telefone" placeholder="(11) 99999-9999" />

          <label for="nomeCompleto">Nome completo</label>
          <input
            type="text"
            id="nomeCompleto"
            name="nomeCompleto"
            placeholder="Seu nome profissional"
          />

          <label for="editarCidade">Cidade</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="editarCidade"
              name="cidade"
              placeholder="Digite ou selecione uma cidade"
              autocomplete="off"
            />
            <ul id="editarCidadeSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="bairro">Bairro</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="bairro"
              name="bairro"
              placeholder="Selecione uma cidade primeiro"
              autocomplete="off"
              disabled
            />
            <ul id="editarBairroSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="especialidade">Especialidade principal</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="especialidade"
              name="especialidade"
              placeholder="Digite uma especialidade"
              autocomplete="off"
            />
            <ul id="editarEspecialidadeSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="especialidadeSecundaria">Especializa&ccedil;&atilde;o adicional <span style="font-weight:400; color:#64748b;">(opcional)</span></label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="especialidadeSecundaria"
              name="especialidadeSecundaria"
              placeholder="Digite uma especializa&ccedil;&atilde;o adicional"
              autocomplete="off"
            />
            <ul id="editarEspecialidadeSecundariaSuggestions" class="suggestions-list"></ul>
          </div>

          <label for="atendimento">Tipo de atendimento</label>
          <select id="atendimento" name="atendimento">
            <option value="">Selecione uma op&ccedil;&atilde;o</option>
            <option value="Clínica">Cl&iacute;nica</option>
            <option value="Domiciliar">Domiciliar</option>
            <option value="Clínica e domiciliar">Cl&iacute;nica e domiciliar</option>
            <option value="Online">Online</option>
          </select>

          <label for="instagram">Instagram</label>
          <input type="url" id="instagram" name="instagram" placeholder="https://instagram.com/seuperfil" />

          <label for="linkedin">LinkedIn</label>
          <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/seuperfil" />


          <label for="descricao">Sobre voc&ecirc;</label>
          <textarea id="descricao" name="descricao" rows="5" placeholder="Fale brevemente sobre sua atua&ccedil;&atilde;o..."></textarea>

          <button type="submit" class="btn btn-primary btn-block">
            Salvar altera&ccedil;&otilde;es
          </button>

          <p id="editarMensagem" class="success-message"></p>
        </form>
      </div>
    </section>
  </main>

  </footer></body>
</html>
