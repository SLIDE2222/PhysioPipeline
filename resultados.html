<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados da busca | Physio Pipeline</title>
  <link rel="stylesheet" href="style.css?v=resultcards2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
</head>
<body>
<header class="header">
  <div class="container nav">
    <a href="index.html" class="logo">Physio<span>Pipeline</span></a>

    <nav class="nav-links">
      <a href="buscar.html">Nova busca</a>
      <a href="cadastro.html" id="cadastroLink">Cadastrar perfil</a>
    </nav>

    <div id="authArea" style="display:flex; gap:10px; align-items:center;"></div>
  </div>
</header>

  <main class="page-main">
    <section class="page-section">
      <div class="container">
        <div class="section-heading left">
          <p class="eyebrow">Resultados</p>
          <h1>Profissionais encontrados</h1>
          <p id="resultadoResumo">Carregando busca...</p>
        </div>

       <form class="results-search-inline" action="resultados.html" method="GET">

  <div class="autocomplete-wrapper">
    <input
      type="text"
      id="specialtyInput"
      name="especialidade"
      placeholder="Especialidade"
      autocomplete="off"
      required
    />
    <ul id="specialtySuggestions" class="suggestions-list"></ul>
  </div>

  <div class="autocomplete-wrapper">
    <input
      type="text"
      id="cityIndexSelect"
      name="cidade"
      placeholder="Cidade"
      autocomplete="off"
      required
    />
    <ul id="cityIndexSuggestions" class="suggestions-list"></ul>
  </div>

  <div class="autocomplete-wrapper">
    <input
      type="text"
      id="buscarBairroIndex"
      name="bairro"
      placeholder="Bairro"
      autocomplete="off"
      disabled
    />
    <ul id="bairroIndexSuggestions" class="suggestions-list"></ul>
  </div>

  <button type="submit" class="btn btn-primary">
    Pesquisar
  </button>

</form>

        <div class="results-grid" id="resultsGrid"></div>
      </div>
    </section>
  </main>

  <script src="api.js?v=prodapi2"></script>
  <script src="script.js?v=specialtymatch1"></script>
    <footer class="footer tech-signature-footer">
    <div class="container footer-content tech-signature-footer__content">
      <div>
        <a href="index.html" class="logo">Physio<span>Pipeline</span></a>
        <p class="footer-text">Conectando pacientes e fisioterapeutas com tecnologia simples, limpa e útil.</p>
      </div>

      <div class="tech-signature">
  <span class="tech-signature__label">Developed by</span>
  <span class="tech-signature__name">Jeffrey Walker</span>
  <span class="tech-signature__tag">Founder & Creator</span>
  <span class="tech-signature__pulse" aria-hidden="true"></span>
</div>
    </div>
  </footer>
</body>
</html>
