<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova senha | PhysioPipeline</title>
  <link rel="stylesheet" href="./style.css?v=resetfix1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">Physio<span>Pipeline</span></a>
      <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="buscar.html">Buscar</a>
      </nav>
      <a href="login.html" class="btn btn-outline">Entrar</a>
    </div>
  </header>

  <main class="page-main">
    <section class="page-section">
      <div class="container narrow">
        <div class="section-heading left">
          <p class="eyebrow">Nova senha</p>
          <h1>Crie uma nova senha</h1>
          <p>Abra esta página pelo link recebido no e-mail.</p>
        </div>

        <form class="form-card" id="updatePasswordForm">
          <label for="novaSenha">Nova senha</label>
          <input type="password" id="novaSenha" autocomplete="new-password" required />

          <label for="confirmarNovaSenha">Confirmar nova senha</label>
          <input type="password" id="confirmarNovaSenha" autocomplete="new-password" required />

          <button type="submit" class="btn btn-primary btn-block">Salvar nova senha</button>
          <p id="updatePasswordMensagem" class="success-message" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="./api.js?v=prodapi2"></script>
  <script src="./update-password.js?v=resetfix1"></script>
</body>
</html>
