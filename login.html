<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | PhysioPipeline</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">Physio<span>Pipeline</span></a>

      <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="buscar.html">Buscar</a>
      </nav>

      <a href="cadastro.html" class="btn btn-outline">Cadastrar</a>
    </div>
  </header>

  <main class="page-main">
    <section class="page-section">
      <div class="container narrow">
        <div class="section-heading left">
          <p class="eyebrow">Entrar</p>
          <h1>Acesse sua conta</h1>
          <p>Entre para gerenciar seu perfil profissional.</p>
        </div>

        <form class="form-card" id="loginForm">
          <label for="loginEmail">E-mail</label>
          <input
            type="email"
            id="loginEmail"
            name="email"
            placeholder="seuemail@email.com"
            required
          />

          <label for="loginSenha">Senha</label>
          <input
            type="password"
            id="loginSenha"
            name="senha"
            placeholder="Digite sua senha"
            required
          />

          <button type="submit" class="btn btn-primary btn-block">
            Entrar
          </button>

          <p id="loginMensagem" class="success-message"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
