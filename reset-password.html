<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar senha | PhysioPipeline</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">Physio<span>Pipeline</span></a>
      <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="buscar.html">Buscar</a>
      </nav>
      <a href="login.html" class="btn btn-outline">Entrar</a>
    </div>
  </header>

  <main class="page-main">
    <section class="page-section">
      <div class="container narrow">
        <div class="section-heading left">
          <p class="eyebrow">Recuperar acesso</p>
          <h1>Esqueceu sua senha?</h1>
          <p>Digite o e-mail da conta cadastrada. Vamos enviar um link para criar uma nova senha.</p>
        </div>

        <form class="form-card" id="resetForm">
          <label for="resetEmail">E-mail</label>
          <input type="email" id="resetEmail" name="email" placeholder="seuemail@email.com" required />

          <button type="submit" class="btn btn-primary btn-block">Enviar link de recuperação</button>

          <p id="resetMensagem" class="success-message"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="./api.js?v=prodfix3"></script>
  <script src="./reset-password.js?v=101"></script>
</body>
</html>
